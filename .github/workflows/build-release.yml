name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Package for Windows
      run: npm run make
      env:
        NODE_ENV: production
        
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: clippy-desktop-windows
        path: out/make/squirrel.windows/x64/*.exe
        
    - name: Upload Windows artifacts (all)
      uses: actions/upload-artifact@v4
      with:
        name: clippy-desktop-windows-all
        path: out/make/

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Package for macOS
      run: npm run make
      env:
        NODE_ENV: production
        
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: clippy-desktop-macos
        path: out/make/*.dmg
        
    - name: Upload macOS artifacts (all)
      uses: actions/upload-artifact@v4
      with:
        name: clippy-desktop-macos-all
        path: out/make/

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          clippy-desktop-windows/**/*.exe
          clippy-desktop-macos/**/*.dmg
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            ext: exe
          - os: macos-latest
            platform: darwin
            arch: x64
            ext: dmg
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: deb

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run make

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: clippy-desktop-${{ matrix.platform }}-${{ matrix.arch }}
        path: |-
          out/make/**/*.exe
          out/make/**/*.dmg
          out/make/**/*.deb
          out/make/**/*.rpm
          out/make/**/*.zip
          !out/make/zip/**/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}